<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>URL Shortener · Event Horizon</title>
<meta name="description" content="Démo visuelle d'un raccourcisseur d'URL — interface 'trou noir'." />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif; color: #fff; background: #000;
    overflow: hidden; position: relative;
  }
  canvas#scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  .vignette { position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 44%, transparent 36%, rgba(0,0,0,.6) 100%); }
  .grain { position: fixed; inset: 0; pointer-events: none; opacity: .04; mix-blend-mode: overlay;
    background-image: repeating-conic-gradient(#fff 0 0.0007turn, #000 0 0.0014turn); }

  .top { position: fixed; top: 6.5vh; left: 0; right: 0; text-align: center; z-index: 5; pointer-events: none; }
  h1 { font-size: clamp(1.5rem, 4.2vw, 2.7rem); font-weight: 900; letter-spacing: 8px;
    text-transform: uppercase; color: #fff; }
  .sub { margin-top: 12px; color: #8a8a8a; font-size: clamp(.78rem,1.5vw,.95rem); letter-spacing: 3px;
    text-transform: uppercase; }

  .panel { position: fixed; bottom: 7.5vh; left: 50%; transform: translateX(-50%);
    width: min(640px, 92vw); z-index: 6; text-align: center; }
  .field { display: flex; gap: 12px; }
  input {
    flex: 1; padding: 16px 18px; border-radius: 14px; font-size: 1rem; color: #fff; outline: none;
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.25);
    backdrop-filter: blur(8px); letter-spacing: .3px;
  }
  input::placeholder { color: #666; }
  input:focus { border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,.12); }
  button.go {
    padding: 16px 26px; border: 1px solid #fff; border-radius: 14px; cursor: pointer; font-weight: 800;
    letter-spacing: 2px; text-transform: uppercase; color: #000; background: #fff;
    transition: transform .15s, background .15s, color .15s;
  }
  button.go:hover { transform: translateY(-2px); }
  button.go:active { transform: translateY(0); }
  button.go:disabled { opacity: .45; cursor: default; transform: none; }

  .result { margin-top: 22px; opacity: 0; transform: translateY(14px) scale(.92); pointer-events: none;
    transition: opacity .6s ease, transform .6s cubic-bezier(.2,1.5,.4,1); }
  .result.show { opacity: 1; transform: none; pointer-events: auto; }
  .card { display: inline-flex; flex-direction: column; gap: 8px; padding: 16px 26px; border-radius: 16px;
    background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.5); backdrop-filter: blur(10px);
    box-shadow: 0 0 50px rgba(255,255,255,.18); }
  .code { font: 900 2rem/1 "Segoe UI", monospace; letter-spacing: 6px; color: #fff;
    text-shadow: 0 0 18px rgba(255,255,255,.7); }
  .stat { font-size: .82rem; color: #9a9a9a; letter-spacing: .3px; display: flex; gap: 8px;
    align-items: center; justify-content: center; flex-wrap: wrap; }
  .stat b { color: #fff; }
  .mini { background: transparent; border: 1px solid rgba(255,255,255,.4); color: #fff; border-radius: 8px;
    padding: 3px 9px; font-size: .72rem; cursor: pointer; letter-spacing: .5px; }
  .mini:hover { background: rgba(255,255,255,.12); }

  .demo-note { position: fixed; bottom: 14px; left: 0; right: 0; text-align: center; z-index: 6;
    color: #5a5a5a; font-size: .7rem; letter-spacing: 1px; pointer-events: none; }
  .demo-note a { color: #888; pointer-events: auto; }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="vignette"></div>
  <div class="grain"></div>

  <div class="top">
    <h1>EVENT HORIZON</h1>
    <div class="sub">Jetez une URL dans la singularité — elle en ressort raccourcie</div>
  </div>

  <div class="panel">
    <div class="field">
      <input id="url" type="text" placeholder="www.exemple.com"
             value="https://exemple.com/destination/longue" autocomplete="off" spellcheck="false" />
      <button class="go" id="go">Engloutir</button>
    </div>
    <div class="result" id="result">
      <div class="card">
        <div class="code" id="code">······</div>
        <div class="stat">
          <span id="surl">https://sho.rt/…</span>
          <span>· clics : <b id="clicks">0</b></span>
          <button class="mini" id="copy">copier</button>
        </div>
      </div>
    </div>
  </div>

  <div class="demo-note">
    Démo visuelle — le raccourcissement est simulé côté navigateur ·
    <a href="https://github.com/tangilibrt/BitlymaispasbitlypourDevops" target="_blank" rel="noopener">code source &amp; vraie app (Docker)</a>
  </div>

<script>
const cv = document.getElementById("scene");
const ctx = cv.getContext("2d");
const TAU = Math.PI * 2;
const urlInput = document.getElementById("url");
let W, H, DPR, cx, cy, R, Rx, tilt = 0.40;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  cx = W / 2; cy = H * 0.45;
  R = Math.max(46, Math.min(W, H) * 0.085);
  Rx = R * 3.0;
  buildStars();
}
addEventListener("resize", resize);

let stars = [];
function buildStars() {
  stars = [];
  const n = Math.round((W * H) / 8000);
  for (let i = 0; i < n; i++)
    stars.push({ x: Math.random()*W, y: Math.random()*H, z: Math.random()*.8+.2,
      r: Math.random()*1.3+.2, tw: Math.random()*TAU, tws: Math.random()*2+1 });
}
function lens(x, y) {
  const dx = x-cx, dy = y-cy, d = Math.hypot(dx, dy), inf = R*4;
  if (d > inf || d < 1) return [x, y, 1];
  const t = 1 - d/inf, pull = (R*1.6)*t*t/d;
  return [x + dx*pull, y + dy*pull, 1 - t*0.85];
}
function drawStars(t) {
  for (const s of stars) {
    const tw = .5 + .5*Math.sin(t*0.001*s.tws + s.tw);
    const [lx, ly, vis] = lens(s.x, s.y);
    if (vis <= 0) continue;
    ctx.globalAlpha = (.25 + .6*tw) * vis * s.z;
    ctx.fillStyle = "#fff";
    ctx.fillRect(lx, ly, s.r, s.r);
  }
  ctx.globalAlpha = 1;
}

function drawHole() {
  ctx.save(); ctx.globalCompositeOperation = "lighter";
  for (let i = 0; i < 3; i++) {
    ctx.beginPath(); ctx.arc(cx, cy, R*(1.02 + i*0.04), 0, TAU);
    ctx.lineWidth = i === 0 ? 2.4 : 5 - i;
    ctx.strokeStyle = `rgba(255,255,255,${0.85 - i*0.28})`;
    ctx.shadowColor = "#fff"; ctx.shadowBlur = 26 - i*6; ctx.stroke();
  }
  ctx.restore();
  const g = ctx.createRadialGradient(cx, cy, R*0.1, cx, cy, R*1.02);
  g.addColorStop(0, "#000"); g.addColorStop(0.9, "#000");
  g.addColorStop(1, "rgba(255,255,255,0.06)");
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, R*1.02, 0, TAU); ctx.fill();
}

function drawGlyphAt(ch, x, y, scale, alpha, stretch, bright) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale * stretch);
  ctx.globalAlpha = alpha * bright;
  ctx.fillStyle = "#fff";
  ctx.shadowColor = "#fff"; ctx.shadowBlur = 9 * bright;
  ctx.font = "700 22px ui-monospace, monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(ch, 0, 0);
  ctx.restore();
}

let state = "idle", baseRot = 0, glyphs = [], absorbT0 = 0, absorbDur = 0;
const FLY_DUR = 750;
const easeOut = p => 1 - Math.pow(1 - p, 3);

const PER_RING = 22, MAX_RINGS = 9;
const ringRadius = r => Rx * (1 + r * 0.5);
const ringTilt   = r => tilt * (1 - r * 0.04);
const ringDir    = r => (r % 2 ? -1 : 1);
const ringSpeed  = r => 1 / (1 + r * 0.28);

function glyphGeom(i) {
  const rIdx = Math.floor(i / PER_RING), slot = i % PER_RING;
  const count = Math.min(PER_RING, ring.length - rIdx * PER_RING);
  const step = TAU / Math.max(count, 12);
  const a = baseRot * ringDir(rIdx) * ringSpeed(rIdx) + slot * step + rIdx * 0.7;
  const rad = ringRadius(rIdx), tl = ringTilt(rIdx);
  return { rIdx, a, rad, tl, x: cx + Math.cos(a)*rad, y: cy + Math.sin(a)*rad*tl, depth: Math.sin(a) };
}

function currentChars() {
  let s = (urlInput.value || urlInput.placeholder || "").replace(/^https?:\/\//, "");
  const cap = PER_RING * MAX_RINGS;
  if (s.length > cap) s = s.slice(0, cap - 1) + "…";
  return s.split("");
}
function caretPos() {
  const rect = urlInput.getBoundingClientRect();
  ctx.save(); ctx.font = '600 16px "Segoe UI", system-ui, sans-serif';
  const w = ctx.measureText(urlInput.value).width; ctx.restore();
  const x = rect.left + Math.min(18 + w, rect.width - 16);
  return [x, rect.top + rect.height / 2];
}

let ring = [];
function initRing() { ring = currentChars().map(ch => ({ ch, t0: -1e9, sx: cx, sy: cy })); }
function syncRing() {
  const chars = currentChars(), now = performance.now();
  for (let i = 0; i < Math.min(chars.length, ring.length); i++) ring[i].ch = chars[i];
  if (chars.length > ring.length) {
    const [sx, sy] = caretPos();
    for (let i = ring.length; i < chars.length; i++)
      ring.push({ ch: chars[i], t0: now + (i - ring.length) * 60, sx, sy });
  } else if (chars.length < ring.length) { ring.length = chars.length; }
}

function drawIdleRing(now) {
  const back = [], front = [], flyers = [];
  for (let i = 0; i < ring.length; i++) {
    const g = ring[i], geo = glyphGeom(i);
    const oScale = (0.66 + (geo.depth + 1)/2 * 0.5) * (1 - geo.rIdx * 0.05);
    const oBright = 0.28 + (geo.depth + 1)/2 * 0.72;
    const p = (now - g.t0) / FLY_DUR;
    if (p < 1) {
      const e = easeOut(Math.max(0, p));
      const bow = Math.sin(e * Math.PI) * (Rx * 0.5);
      const x = g.sx + (geo.x - g.sx) * e, y = g.sy + (geo.y - g.sy) * e - bow;
      const scale = (0.15 + e * (oScale - 0.15)) * (1 + (1 - e) * 0.4);
      flyers.push({ ch: g.ch, x, y, scale, alpha: Math.min(1, e*1.6), bright: 0.6 + 0.4*e });
    } else {
      (geo.depth < 0 ? back : front).push({ ch: g.ch, x: geo.x, y: geo.y, scale: oScale, bright: oBright });
    }
  }
  for (const g of back) drawGlyphAt(g.ch, g.x, g.y, g.scale, 1, 1, g.bright);
  drawHole();
  for (const g of front) drawGlyphAt(g.ch, g.x, g.y, g.scale, 1, 1, g.bright);
  for (const f of flyers) drawGlyphAt(f.ch, f.x, f.y, f.scale, f.alpha, 1, f.bright);
}

function drawAbsorb(now) {
  const t = (now - absorbT0) / 1000, per = 0.55;
  const stag = Math.max(0.012, (absorbDur - per) / Math.max(glyphs.length, 1));
  const back = [], front = []; let allDone = true;
  glyphs.forEach((g, i) => {
    const p = Math.max(0, Math.min(1, (t - i*stag) / per));
    if (p < 1) allDone = false;
    if (p >= 1) return;
    const a = g.a0 + (baseRot - g.b0) * ringDir(g.rIdx) * ringSpeed(g.rIdx) + p * 5.5;
    const Rstart = ringRadius(g.rIdx);
    const rad = R * 1.02 + (Rstart - R * 1.02) * Math.pow(1 - p, 2);
    const tl = ringTilt(g.rIdx);
    const x = cx + Math.cos(a)*rad, y = cy + Math.sin(a)*rad*tl, depth = Math.sin(a);
    const scale = 0.66 + (depth + 1)/2 * 0.5, bright = 0.4 + (depth + 1)/2 * 0.6;
    const stretch = 1 + p*p*4.5, alpha = p < 0.8 ? 1 : (1 - (p - 0.8)/0.2);
    (depth < 0 ? back : front).push({ ch: g.ch, x, y, scale, alpha, stretch, bright });
  });
  for (const g of back) drawGlyphAt(g.ch, g.x, g.y, g.scale, g.alpha, g.stretch, g.bright);
  drawHole();
  for (const g of front) drawGlyphAt(g.ch, g.x, g.y, g.scale, g.alpha, g.stretch, g.bright);
  if (allDone && state === "absorb") { state = "done"; triggerEmergence(); revealCode(); }
}

let shock = null, flash = 0;
function triggerEmergence() { shock = { r: R*0.5, a: 1 }; flash = 1; }
function drawShock(dt) {
  if (flash > 0) {
    ctx.save(); ctx.globalCompositeOperation = "lighter";
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R*4);
    g.addColorStop(0, `rgba(255,255,255,${flash*0.8})`); g.addColorStop(1, "transparent");
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H); ctx.restore();
    flash = Math.max(0, flash - dt*1.7);
  }
  if (shock) {
    shock.r += dt*560; shock.a -= dt*1.05; if (shock.a <= 0) { shock = null; return; }
    ctx.save(); ctx.globalCompositeOperation = "lighter";
    ctx.strokeStyle = `rgba(255,255,255,${shock.a})`; ctx.lineWidth = 2.5;
    ctx.shadowColor = "#fff"; ctx.shadowBlur = 20;
    ctx.beginPath(); ctx.ellipse(cx, cy, shock.r, shock.r*tilt, 0, 0, TAU); ctx.stroke();
    ctx.restore();
  }
}

let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now-last)/1000); last = now;
  baseRot += dt * 0.35;
  ctx.fillStyle = "#000"; ctx.fillRect(0, 0, W, H);
  drawStars(now);
  if (state === "absorb") drawAbsorb(now); else drawIdleRing(now);
  drawShock(dt);
  requestAnimationFrame(loop);
}

/* code court simulé côté client (démo statique, sans backend) */
const code62 = () => Array.from({length:6}, () =>
  "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"[Math.floor(Math.random()*62)]).join("");
const btn = document.getElementById("go");
const resultEl = document.getElementById("result");
const surlEl = document.getElementById("surl");
const copyBtn = document.getElementById("copy");
function revealCode() {
  setTimeout(() => {
    const c = code62();
    document.getElementById("code").textContent = c;
    surlEl.textContent = `https://sho.rt/${c}`;
    document.getElementById("clicks").textContent = "0";
    resultEl.classList.add("show");
    btn.disabled = false;
  }, 120);
}
function launch() {
  if (state === "absorb") return;
  if (!urlInput.value.trim()) { urlInput.focus(); return; }
  resultEl.classList.remove("show"); btn.disabled = true;
  glyphs = ring.map((g, i) => {
    const rIdx = Math.floor(i / PER_RING), slot = i % PER_RING;
    const count = Math.min(PER_RING, ring.length - rIdx * PER_RING);
    const step = TAU / Math.max(count, 12);
    return { ch: g.ch, rIdx, a0: slot * step + rIdx * 0.7, b0: baseRot };
  });
  absorbDur = 0.55 + glyphs.length * 0.03;
  absorbT0 = performance.now(); state = "absorb";
}
btn.addEventListener("click", launch);
urlInput.addEventListener("keydown", e => { if (e.key === "Enter") launch(); });
urlInput.addEventListener("input", () => {
  if (state === "done") { state = "idle"; resultEl.classList.remove("show"); }
  if (state !== "absorb") syncRing();
});
copyBtn.addEventListener("click", () => {
  navigator.clipboard?.writeText(surlEl.textContent).then(() => {
    copyBtn.textContent = "copié ✓"; setTimeout(() => (copyBtn.textContent = "copier"), 1500);
  });
});

resize(); initRing(); requestAnimationFrame(loop);
</script>
</body>
</html>
