name: CI

on:
  push:
  pull_request:

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint - black (format check)
        run: black --check app validator tests

      - name: Lint - flake8
        run: flake8 app validator tests

      - name: Lint - pylint
        run: pylint app validator

      - name: Tests + coverage (fail under 85%)
        run: pytest --cov=app --cov=validator --cov-report=xml --cov-report=html --cov-report=term --cov-fail-under=85

      - name: Upload coverage & test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  docker-build:
    runs-on: ubuntu-latest
    needs: quality-and-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build shortener image
        run: docker build -f Dockerfile.shortener -t url-shortener/shortener-service .

      - name: Build validator image
        run: docker build -f Dockerfile.validator -t url-shortener/validator-service .
