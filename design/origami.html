<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Concept · Origami</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; font-family: "Segoe UI", system-ui, sans-serif; color: #4a2f1e;
    background: linear-gradient(135deg, #ffd9a0 0%, #ff9a8b 45%, #ff6a88 100%);
    display: grid; place-items: center; overflow: hidden;
  }
  .back { position: fixed; top: 18px; left: 20px; color: #7a3b2e; text-decoration: none;
    font-size: .9rem; opacity: .85; } .back:hover { color: #3a1a12; }

  .stage { width: min(560px, 92vw); text-align: center; }
  h1 { font-size: 1.8rem; font-weight: 800; color: #5a2a1c; letter-spacing: .5px; }
  .sub { color: #8a4a38; margin: 6px 0 34px; font-size: .92rem; }

  .fold-area { perspective: 900px; height: 130px; display: grid; place-items: center; margin-bottom: 22px; }
  .strip { display: flex; transform-style: preserve-3d; }
  .panel {
    padding: 16px 10px; font: 700 .8rem/1 monospace; white-space: nowrap; color: #5a2a1c;
    background: linear-gradient(180deg, #fffdf6, #ffe9cf);
    box-shadow: 0 6px 16px rgba(120,60,30,.25); border-radius: 4px;
    transform-origin: left center; transition: transform .5s ease, opacity .5s, width .5s;
  }
  .panel:nth-child(even) { background: linear-gradient(180deg, #fff3df, #ffd9a8); }
  .strip.folded .panel { transform: rotateY(78deg) scale(.4); opacity: 0; width: 0; padding: 16px 0; }
  .strip.folded .label { transform: none; opacity: 1; width: auto; padding: 16px 22px; }
  .label {
    background: #5a2a1c !important; color: #ffe9cf; border-radius: 10px;
    box-shadow: 0 8px 22px rgba(90,42,28,.5); font-size: 1.3rem; letter-spacing: 2px;
    position: relative;
  }
  .label::before { content: "✦"; position: absolute; left: -8px; top: 50%; transform: translateY(-50%);
    color: #fff; font-size: .7rem; }

  .field { display: flex; gap: 10px; }
  input { flex: 1; padding: 14px 16px; border-radius: 14px; border: 2px solid rgba(90,42,28,.25);
    background: rgba(255,255,255,.7); color: #5a2a1c; font-size: 1rem; outline: none; }
  input:focus { border-color: #5a2a1c; box-shadow: 0 0 0 3px rgba(90,42,28,.15); }
  button { padding: 14px 26px; border: none; border-radius: 14px; cursor: pointer; font-weight: 800;
    color: #fff; background: linear-gradient(90deg, #ff6a88, #ff99ac);
    box-shadow: 0 10px 24px rgba(255,106,136,.5); transition: transform .15s; }
  button:hover { transform: translateY(-2px); }

  .result { margin-top: 26px; opacity: 0; transform: translateY(10px); transition: .5s .3s; }
  .result.show { opacity: 1; transform: none; }
  .card { display: inline-block; padding: 14px 22px; border-radius: 16px;
    background: rgba(255,255,255,.75); box-shadow: 0 10px 30px rgba(120,60,30,.25); }
  .code { font: 800 1.6rem/1 monospace; color: #5a2a1c; letter-spacing: 2px; }
  .stat { color: #8a4a38; font-size: .82rem; margin-top: 6px; }
</style>
</head>
<body>
  <a class="back" href="index.html">← Galerie</a>
  <div class="stage">
    <h1>Origami Shortener</h1>
    <p class="sub">L'URL se replie en accordéon jusqu'à devenir une étiquette ▱▰</p>

    <div class="fold-area">
      <div class="strip" id="strip">
        <span class="panel">https://</span><span class="panel">exemple</span><span class="panel">.com/</span>
        <span class="panel">tres</span><span class="panel">/long</span><span class="panel">/path</span>
        <span class="panel label" id="label">aBc123</span>
      </div>
    </div>

    <div class="field">
      <input id="url" type="text" value="https://exemple.com/tres/long/path" />
      <button id="go">Replier</button>
    </div>

    <div class="result" id="result">
      <div class="card">
        <div class="code" id="code">aBc123</div>
        <div class="stat" id="stat">https://sho.rt/aBc123 · clics : 0</div>
      </div>
    </div>
  </div>
<script>
  const code62 = () => Array.from({length:6}, () =>
    "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"[Math.floor(Math.random()*62)]).join("");
  document.getElementById("go").addEventListener("click", () => {
    const strip = document.getElementById("strip"), res = document.getElementById("result");
    const c = code62();
    document.getElementById("label").textContent = c;
    strip.classList.remove("folded"); res.classList.remove("show");
    void strip.offsetWidth;
    requestAnimationFrame(() => strip.classList.add("folded"));
    setTimeout(() => {
      document.getElementById("code").textContent = c;
      document.getElementById("stat").textContent = `https://sho.rt/${c} · clics : 0`;
      res.classList.add("show");
    }, 800);
  });
</script>
</body>
</html>
