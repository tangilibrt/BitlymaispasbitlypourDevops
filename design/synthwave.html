<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Concept · Téléportation Synthwave</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --pink: #ff2e97; --cyan: #2de2e6; --purple: #b14aed; }
  body {
    min-height: 100vh; overflow: hidden; font-family: "Segoe UI", system-ui, sans-serif;
    color: #fdf0ff; background: linear-gradient(180deg, #2b1055 0%, #7d2a8b 55%, #ff7eb3 100%);
    display: grid; place-items: center;
  }
  /* sun */
  .sun { position: fixed; top: 12%; left: 50%; transform: translateX(-50%);
    width: 320px; height: 320px; border-radius: 50%;
    background: linear-gradient(#fff6b0, #ff5db1 55%, #b14aed);
    box-shadow: 0 0 120px rgba(255,93,177,.6);
    -webkit-mask: repeating-linear-gradient(#000 0 14px, transparent 14px 20px);
    mask: repeating-linear-gradient(#000 0 14px, transparent 14px 20px); opacity: .8; }
  /* neon perspective grid */
  .grid { position: fixed; bottom: 0; left: -25%; width: 150%; height: 45%;
    background-image: linear-gradient(var(--cyan) 2px, transparent 2px),
      linear-gradient(90deg, var(--cyan) 2px, transparent 2px);
    background-size: 60px 60px; opacity: .5;
    transform: perspective(320px) rotateX(68deg); animation: roll 1.6s linear infinite; }
  @keyframes roll { to { background-position-y: 60px; } }

  .back { position: fixed; top: 18px; left: 20px; z-index: 9; color: #ffd9f2;
    text-decoration: none; font-size: .9rem; } .back:hover { color: #fff; }

  .stage { position: relative; z-index: 3; width: min(580px, 92vw); text-align: center; }
  h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
    color: #fff; text-shadow: 0 0 10px var(--pink), 0 0 26px var(--purple); }
  .sub { color: #ffd9f2; margin: 6px 0 26px; font-size: .9rem; }

  .portal { position: relative; height: 200px; margin-bottom: 20px; display: grid; place-items: center; }
  .ring { position: absolute; border-radius: 50%; border: 2px solid var(--cyan);
    box-shadow: 0 0 18px var(--cyan), inset 0 0 18px var(--pink); animation: pulse 2.4s ease-in-out infinite; }
  .ring:nth-child(1){ width: 190px; height: 190px; }
  .ring:nth-child(2){ width: 140px; height: 140px; border-color: var(--pink); box-shadow: 0 0 18px var(--pink); animation-delay:.3s; }
  .ring:nth-child(3){ width: 92px; height: 92px; border-color: var(--purple); box-shadow: 0 0 18px var(--purple); animation-delay:.6s; }
  @keyframes pulse { 50% { transform: scale(1.08); opacity: .7; } }

  .ghost { position: absolute; font: 700 .9rem/1 monospace; white-space: nowrap;
    color: var(--cyan); text-shadow: 0 0 10px var(--cyan); opacity: 0; }
  .ghost.go { animation: telescope 1.1s cubic-bezier(.7,0,.3,1) forwards; }
  @keyframes telescope {
    0% { opacity: 1; letter-spacing: 2px; transform: scaleX(1); filter: blur(0); }
    70% { opacity: 1; }
    100% { opacity: 0; letter-spacing: -8px; transform: scaleX(.02); filter: blur(4px); }
  }

  .field { display: flex; gap: 10px; }
  input { flex: 1; padding: 14px 16px; border-radius: 12px; border: 2px solid var(--cyan);
    background: rgba(43,16,85,.6); color: #fff; font-size: 1rem; outline: none; backdrop-filter: blur(6px); }
  input:focus { box-shadow: 0 0 0 3px rgba(45,226,230,.3); }
  button { padding: 14px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px; color: #2b1055;
    background: linear-gradient(90deg, var(--cyan), var(--pink)); box-shadow: 0 0 24px rgba(255,46,151,.6); }
  button:hover { transform: translateY(-2px); }

  .result { margin-top: 24px; opacity: 0; transform: scale(.7); }
  .result.show { animation: warpIn .7s cubic-bezier(.2,1.5,.4,1) forwards; }
  @keyframes warpIn { to { opacity: 1; transform: scale(1); } }
  .plate { display: inline-flex; align-items: center; gap: 10px; padding: 12px 18px; border-radius: 12px;
    background: rgba(43,16,85,.55); border: 2px solid var(--pink); backdrop-filter: blur(8px);
    box-shadow: 0 0 30px rgba(177,74,237,.6); }
  .bracket { color: var(--cyan); font: 800 1.8rem/1 monospace; }
  .code { font: 800 1.7rem/1 monospace; letter-spacing: 2px; color: #fff; text-shadow: 0 0 14px var(--pink); }
  .stat { margin-top: 8px; font-size: .82rem; color: #ffd9f2; }
</style>
</head>
<body>
  <div class="sun"></div>
  <div class="grid"></div>
  <a class="back" href="index.html">← Galerie</a>

  <div class="stage">
    <h1>Warp Shortener</h1>
    <p class="sub">L'URL se télescope dans le wormhole ◉◉◉</p>

    <div class="portal">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="ghost" id="ghost"></div>
    </div>

    <div class="field">
      <input id="url" type="text" value="https://exemple.com/longue/destination" />
      <button id="go">Téléporter</button>
    </div>

    <div class="result" id="result">
      <div class="plate">
        <span class="bracket">【</span><span class="code" id="code">aBc123</span><span class="bracket">】</span>
      </div>
      <div class="stat" id="stat">https://sho.rt/aBc123 · clics : 0</div>
    </div>
  </div>
<script>
  const code62 = () => Array.from({length:6}, () =>
    "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"[Math.floor(Math.random()*62)]).join("");
  document.getElementById("go").addEventListener("click", () => {
    const url = document.getElementById("url").value || "https://exemple.com";
    const g = document.getElementById("ghost"), res = document.getElementById("result");
    g.textContent = url.length > 40 ? url.slice(0,40)+"…" : url;
    g.classList.remove("go"); void g.offsetWidth; g.classList.add("go");
    res.classList.remove("show");
    setTimeout(() => {
      const c = code62();
      document.getElementById("code").textContent = c;
      document.getElementById("stat").textContent = `https://sho.rt/${c} · clics : 0`;
      res.classList.add("show");
    }, 1000);
  });
</script>
</body>
</html>
